<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Sekolah SKK Rangan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        .iframe-container { position: relative; width: 100%; height: 80vh; overflow: hidden; }
        .iframe-container iframe { position: absolute; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-blue-800 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">Portal SKK Rangan</h1>
            <div id="nav-links">
                <button onclick="changePage('awam')" class="px-4 py-2 hover:bg-blue-700 rounded">Utama (Awam)</button>
                <button onclick="changePage('login')" class="px-4 py-2 bg-yellow-500 hover:bg-yellow-600 rounded text-black font-bold">Log Masuk Staf</button>
            </div>
        </div>
    </nav>

    <main id="app" class="container mx-auto mt-6 p-4">
    </main>

    <script>
        const CLIENT_ID = '719350946455-5hcl5t5nm61e6c208bfd8tnf703jaefh.apps.googleusercontent.com';

        function changePage(page) {
            const app = document.getElementById('app');
            switch(page) {
                case 'awam':
                    app.innerHTML = `
                        <div class="bg-white p-8 rounded-lg shadow">
                            <h2 class="text-3xl font-bold mb-4">Selamat Datang ke Portal Sekolah</h2>
                            <p>Ini adalah paparan umum untuk ibu bapa dan orang awam.</p>
                        </div>`;
                    break;
                case 'login':
                    app.innerHTML = `
                        <div class="max-w-md mx-auto bg-white p-8 rounded shadow text-center">
                            <h2 class="text-2xl font-bold mb-6">Log Masuk Staf (DELIMA)</h2>
                            
                            <!-- Div untuk Google -->
                            <div id="google-login-container" class="flex justify-center mb-4">
                                <div class="g_id_signin" data-type="standard" data-size="large"></div>
                            </div>

                            <!-- Butang Ujian (Hanya muncul jika Google Gagal/Preview) -->
                            <div id="test-login-ui" class="mt-4 hidden">
                                <p class="text-xs text-gray-500 mb-2">Mod Ujian (Tidak akan muncul di GitHub Pages):</p>
                                <button onclick="changePage('staff')" class="bg-gray-800 text-white px-4 py-2 rounded">Uji Login Staf (Preview)</button>
                            </div>
                        </div>`;
                    
                    // Logic: Jika Google API tidak dimuatkan (dalam Preview), tunjukkan butang ujian
                    setTimeout(() => {
                        if (typeof google === 'undefined' || !google.accounts) {
                            document.getElementById('test-login-ui').classList.remove('hidden');
                        } else {
                            google.accounts.id.initialize({
                                client_id: CLIENT_ID,
                                callback: handleCredentialResponse
                            });
                            google.accounts.id.renderButton(
                                document.querySelector('.g_id_signin'),
                                { theme: 'outline', size: 'large' }
                            );
                        }
                    }, 1000);
                    break;
                case 'staff':
                    app.innerHTML = `
                        <div class="bg-white p-4 rounded shadow">
                            <h2 class="text-xl font-bold mb-2">Panel Staf</h2>
                            <div class="iframe-container">
                                <iframe src="https://skkrangan.github.io/skk/" title="Sistem Staf"></iframe>
                            </div>
                        </div>`;
                    break;
            }
        }

        function parseJwt (token) {
            try {
                var base64Url = token.split('.')[1];
                var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch(e) { return {}; }
        }

        function handleCredentialResponse(response) {
            const userData = parseJwt(response.credential);
            if (userData.email && userData.email.endsWith('@moe-dl.edu.my')) {
                changePage('staff');
            } else {
                alert('Akses Ditolak: Hanya akaun DELIMA (@moe-dl.edu.my) dibenarkan.');
            }
        }

        changePage('awam');
    </script>
</body>
</html>
